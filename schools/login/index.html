<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Admin Login</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              heading: ["Manrope", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#eef2fb",
                100: "#dfe7f7",
                200: "#ccd3e6",
                300: "#99a9cc",
                400: "#667eb2",
                500: "#22345f",
                600: "#1a2849",
                700: "#14213d",
                800: "#0f182d",
                900: "#0f1a33",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex items-center justify-center p-4">
    <main class="w-full max-w-md">
      <button
        type="button"
        data-auth-back
        aria-label="Go back"
        class="mb-3 inline-flex h-9 w-9 items-center justify-center rounded-full border border-brand-200 bg-brand-50 text-brand-700 transition-colors hover:bg-brand-100 hover:text-brand-800"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <section class="w-full rounded-2xl bg-white border border-gray-200 p-6 shadow-sm">
      <h1 class="text-2xl font-heading font-extrabold">School Admin Login</h1>
      <p class="mt-2 text-sm text-gray-600">Sign in to manage students, seats, progress, and certificates.</p>
      <form id="schoolLoginForm" class="mt-5 space-y-4">
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Email</span>
          <input id="schoolLoginEmail" type="email" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm" />
        </label>
        <label class="block">
          <span class="text-sm font-semibold text-gray-700">Password</span>
          <input id="schoolLoginPassword" type="password" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm" />
        </label>
        <p id="schoolLoginStatus" class="text-sm text-gray-600"></p>
        <button id="schoolLoginBtn" type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-brand-600 px-6 py-3.5 text-sm font-bold text-white shadow-sm transition-all hover:bg-brand-500 hover:shadow-md">
          Sign In
        </button>
        <div class="pt-1">
          <a href="/schools/reset-password-request/" class="text-sm font-semibold text-brand-700 hover:text-brand-600">Forgot password?</a>
        </div>
      </form>
      </section>
    </main>
    <script src="/assets/auth-back.js?v=20260405a" defer></script>
    <script src="/assets/school-login.js?v=20260404a" defer></script>
  </body>
</html>
