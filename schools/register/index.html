<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt to Profit for Schools</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              heading: ["Manrope", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#eef2fb",
                100: "#dfe7f7",
                200: "#ccd3e6",
                300: "#99a9cc",
                400: "#667eb2",
                500: "#22345f",
                600: "#1a2849",
                700: "#14213d",
                800: "#0f182d",
                900: "#0f1a33",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans">
    <main class="max-w-3xl mx-auto px-4 py-10 sm:py-14">
      <button
        type="button"
        data-auth-back
        aria-label="Go back"
        class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-brand-200 bg-brand-50 text-brand-700 transition-colors hover:bg-brand-100 hover:text-brand-800"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <h1 class="mt-3 text-3xl sm:text-4xl font-heading font-extrabold"><img src="/assets/Prompt to Profit_bkgrd.png" alt="Prompt to Profit logo" class="ptp-logo-inline ptp-logo-inline--heading" /> for Schools</h1>
      <p id="schoolsPricingIntro" class="mt-2 text-gray-600">Bulk school access starts at 50 students. Price is N8,500 per student + VAT.</p>

      <section class="mt-8 bg-white rounded-2xl border border-gray-200 p-5 sm:p-7 shadow-sm">
        <form id="schoolRegisterForm" class="space-y-4">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="text-sm font-semibold text-gray-700">School Name</span>
              <input id="schoolName" type="text" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm text-gray-900" />
            </label>
            <label class="block">
              <span class="text-sm font-semibold text-gray-700">Admin Name</span>
              <input id="adminName" type="text" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm text-gray-900" />
            </label>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="text-sm font-semibold text-gray-700">Admin Email</span>
              <input id="adminEmail" type="email" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm text-gray-900" />
            </label>
            <label class="block">
              <span class="text-sm font-semibold text-gray-700">Admin Phone</span>
              <input id="adminPhone" type="text" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm text-gray-900" />
            </label>
          </div>

          <label class="block">
            <span class="text-sm font-semibold text-gray-700">Number of Students (min 50)</span>
            <input id="seatCount" type="number" min="50" step="1" value="50" required class="mt-1 w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm text-gray-900" />
          </label>

          <div class="rounded-xl bg-gray-50 border border-gray-200 p-4 text-sm text-gray-700 space-y-1">
            <p><strong>Course:</strong> <img src="/assets/Prompt to Profit_bkgrd.png" alt="Prompt to Profit logo" class="ptp-logo-inline" /></p>
            <p id="priceSubtotal">Subtotal: N0</p>
            <p id="priceVat">VAT: N0</p>
            <p id="priceTotal" class="font-bold text-gray-900">Total: N0</p>
          </div>

          <p id="schoolRegisterStatus" class="text-sm text-gray-600"></p>
          <button id="schoolRegisterBtn" type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-brand-600 px-6 py-3.5 text-sm font-bold text-white shadow-sm transition-all hover:bg-brand-500">
            Continue to Payment
          </button>
        </form>
      </section>
    </main>

    <script src="/assets/auth-back.js?v=20260405a" defer></script>
    <script src="/assets/school-register.js?v=20260404a" defer></script>
  </body>
</html>
