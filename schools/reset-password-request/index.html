<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Admin Password Reset</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900 min-h-screen flex items-center justify-center p-4">
    <section class="w-full max-w-md rounded-2xl bg-white border border-slate-200 p-6 shadow-sm">
      <h1 class="text-2xl font-extrabold">Reset School Admin Password</h1>
      <p class="mt-2 text-sm text-slate-600">Enter your school admin email to receive a reset link.</p>
      <form id="schoolResetRequestForm" class="mt-5 space-y-4">
        <label class="block">
          <span class="text-sm font-semibold text-slate-700">Email</span>
          <input id="schoolResetRequestEmail" type="email" required class="mt-1 w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm" />
        </label>
        <p id="schoolResetRequestStatus" class="text-sm text-slate-600"></p>
        <button id="schoolResetRequestBtn" type="submit" class="inline-flex items-center justify-center rounded-xl bg-slate-900 px-5 py-3 text-sm font-bold text-white hover:bg-slate-700">
          Send Reset Link
        </button>
      </form>
      <p class="mt-4 text-sm">
        <a href="/schools/login/" class="font-semibold text-slate-700 hover:text-slate-900">Back to login</a>
      </p>
    </section>
    <script src="/assets/school-reset-password-request.js?v=20260404a" defer></script>
  </body>
</html>
