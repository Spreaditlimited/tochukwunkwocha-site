<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Certificate</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="max-w-5xl mx-auto px-4 py-8 sm:py-12">
      <div class="flex items-center justify-between gap-3 mb-4">
        <a href="/schools/dashboard/" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Back to School Dashboard</a>
        <button id="printCertificateBtn" type="button" class="inline-flex items-center justify-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">Print / Save PDF</button>
      </div>

      <p id="certificateStatus" class="text-sm text-slate-600 mb-3">Loading certificate...</p>

      <section id="certificateCard" class="hidden rounded-2xl border-4 border-amber-300 bg-white shadow-xl">
        <div class="border-b border-amber-200 px-6 py-4 sm:px-10 sm:py-6 bg-gradient-to-r from-amber-50 to-slate-50">
          <p class="text-xs font-bold tracking-[0.2em] uppercase text-amber-700">Tochukwu Tech and AI Academy</p>
          <h1 class="mt-1 text-2xl sm:text-3xl font-extrabold text-slate-900">Certificate of Completion</h1>
        </div>
        <div class="px-6 py-7 sm:px-10 sm:py-10 text-center">
          <p class="text-slate-600">This is to certify that</p>
          <h2 id="certStudentName" class="mt-2 text-3xl sm:text-4xl font-extrabold text-slate-900"></h2>
          <p class="mt-4 text-slate-700">has successfully completed</p>
          <p id="certCourseName" class="mt-1 text-xl sm:text-2xl font-bold text-slate-900"></p>
          <p class="mt-3 text-sm text-slate-600">under the school program</p>
          <p id="certSchoolName" class="mt-1 text-base font-semibold text-slate-800"></p>

          <div class="mt-10 grid grid-cols-1 sm:grid-cols-2 gap-5 text-left">
            <div class="rounded-xl bg-slate-50 border border-slate-200 px-4 py-3">
              <p class="text-[11px] uppercase tracking-wide text-slate-500">Certificate No</p>
              <p id="certNo" class="mt-1 text-sm font-bold text-slate-900"></p>
            </div>
            <div class="rounded-xl bg-slate-50 border border-slate-200 px-4 py-3">
              <p class="text-[11px] uppercase tracking-wide text-slate-500">Date Issued</p>
              <p id="certIssuedAt" class="mt-1 text-sm font-bold text-slate-900"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/assets/school-certificate-view.js?v=20260404a" defer></script>
  </body>
</html>
