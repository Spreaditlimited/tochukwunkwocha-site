<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Certificate | Tochukwu Tech and AI Academy</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
<style>
      body {
        background-color: #060b14;
        color: #cbd5e1;
        margin: 0;
      }
      
      /* Ambient Deep Space Glows */
      .ambient-glow-1 { position: fixed; top: 0%; left: -10%; width: 60%; height: 50%; background: rgba(245, 158, 11, 0.1); border-radius: 50%; filter: blur(150px); pointer-events: none; z-index: 0; }
      .ambient-glow-2 { position: fixed; bottom: -10%; right: -10%; width: 50%; height: 60%; background: rgba(217, 70, 23, 0.1); border-radius: 50%; filter: blur(150px); pointer-events: none; z-index: 0; }
      .tech-grid { position: fixed; inset: 0; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMjMiIGN5PSIyMyIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIvPjwvc3ZnPg=='); pointer-events: none; z-index: 0; }

      /* Certificate specific styling */
      .cert-border-outer {
        position: absolute;
        inset: 12px;
        border: 2px solid #d97706; /* Amber-600 */
        border-radius: 8px;
        pointer-events: none;
      }
      .cert-border-inner {
        position: absolute;
        inset: 18px;
        border: 1px solid #fcd34d; /* Amber-300 */
        border-radius: 4px;
        pointer-events: none;
      }
      
      .cert-seal {
        position: absolute;
        bottom: 40px;
        right: 40px;
        width: 100px;
        height: 100px;
        background: radial-gradient(circle, #f59e0b 0%, #d97706 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3);
        border: 2px dashed #fef3c7;
        opacity: 0.15; /* Subtle watermark feel */
        pointer-events: none;
      }

      /* Print Optimization */
      @media print {
        @page { size: landscape; margin: 0; }
        body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .no-print { display: none !important; }
        .ambient-glow-1, .ambient-glow-2, .tech-grid { display: none !important; }
        main { padding: 0 !important; max-width: none !important; margin: 0 !important; }
        #certificateCard { 
          box-shadow: none !important; 
          border-radius: 0 !important;
          width: 100vw !important; 
          height: 100vh !important; 
          margin: 0 !important;
        }
      }
    </style>
  </head>
  <body class="font-sans antialiased min-h-screen flex flex-col relative selection:bg-amber-500 selection:text-white">
    
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    <div class="tech-grid"></div>

    <main class="relative z-10 w-full max-w-5xl mx-auto px-4 py-8 sm:py-12 flex-1 flex flex-col">
      
      <div class="no-print flex flex-col sm:flex-row items-center justify-between gap-4 mb-8 bg-[#0d1117]/80 backdrop-blur-xl border border-white/10 rounded-2xl p-4 shadow-lg">
        <a href="/schools/dashboard/" class="inline-flex items-center text-sm font-semibold text-slate-400 hover:text-white transition-colors group">
          <svg class="w-4 h-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Back to School Dashboard
        </a>
        <button id="printCertificateBtn" type="button" class="btn-primary w-full sm:w-auto">
          <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
          Print / Save PDF
        </button>
      </div>

      <div id="certificateStatus" class="no-print flex items-center justify-center gap-3 bg-amber-500/10 border border-amber-500/20 text-amber-400 p-4 rounded-xl font-mono text-sm uppercase tracking-widest shadow-[0_0_15px_rgba(245,158,11,0.2)]">
        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
        Loading certificate...
      </div>

      <section id="certificateCard" class="hidden cert-card rounded-xl mx-auto w-full max-w-[1056px] text-slate-900 border-8 border-amber-500/10 transition-opacity duration-500">
        
        <div class="cert-border-outer"></div>
        <div class="cert-border-inner"></div>
        <div class="cert-seal">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>
        </div>

        <div class="relative px-8 pt-16 pb-8 sm:px-16 sm:pt-20 sm:pb-10 text-center">
          <img src="/assets/logo.png" alt="Logo" class="h-10 mx-auto mb-6 opacity-90 filter grayscale" />
          <p class="text-xs sm:text-sm font-bold tracking-[0.3em] uppercase text-amber-700 mb-4">Tochukwu Tech and AI Academy</p>
          <h1 class="text-4xl sm:text-5xl md:text-6xl font-serif text-slate-900 tracking-tight">Certificate of Completion</h1>
          <div class="w-24 h-1 bg-amber-500 mx-auto mt-6 rounded-full opacity-80"></div>
        </div>
        
        <div class="relative px-8 py-8 sm:px-16 sm:py-10 text-center">
          <p class="text-lg text-slate-500 font-serif italic tracking-wide">This is to certify that</p>
          
          <h2 id="certStudentName" class="mt-6 text-4xl sm:text-5xl font-heading font-extrabold text-slate-900 tracking-tight"></h2>
          
          <p class="mt-8 text-lg text-slate-500 font-serif italic tracking-wide">has successfully completed the program</p>
          
          <p id="certCourseName" class="mt-4 text-2xl sm:text-3xl font-heading font-bold text-slate-800"></p>
          
          <p class="mt-6 text-sm text-slate-500 uppercase tracking-widest font-semibold">Under the instruction of</p>
          <p id="certSchoolName" class="mt-2 text-lg font-heading font-extrabold text-slate-900"></p>

          <div class="mt-20 grid grid-cols-1 sm:grid-cols-2 gap-8 text-left max-w-2xl mx-auto border-t border-slate-200/60 pt-8">
            <div class="pl-4 border-l-2 border-amber-300">
              <p class="text-[10px] uppercase font-bold tracking-[0.15em] text-slate-400">Certificate No.</p>
              <p id="certNo" class="mt-1 text-base font-mono font-semibold text-slate-800"></p>
            </div>
            <div class="pl-4 border-l-2 border-amber-300 sm:text-right sm:border-l-0 sm:border-r-2 sm:pr-4">
              <p class="text-[10px] uppercase font-bold tracking-[0.15em] text-slate-400">Date Issued</p>
              <p id="certIssuedAt" class="mt-1 text-base font-mono font-semibold text-slate-800"></p>
            </div>
          </div>
        </div>
      </section>
      
    </main>

    <script src="/assets/bundles/bundle-99c50e1c19d8.min.js" defer></script>
  </body>
</html>
