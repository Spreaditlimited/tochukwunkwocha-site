  <body class="bg-[#060b14] text-slate-300 font-sans antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden selection:bg-brand-500 selection:text-white">
    
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    <div class="tech-grid"></div>

    <section class="relative z-10 w-full max-w-md bg-[#0d1117]/80 backdrop-blur-2xl rounded-[2rem] border border-white/10 p-8 sm:p-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] overflow-hidden group">
      <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-400 via-purple-500 to-brand-600"></div>
      
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-brand-500/10 border border-brand-500/20 text-brand-400 font-mono font-bold text-[10px] uppercase tracking-widest rounded-full mb-5">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
          Secure Portal

        <h1 class="text-3xl font-heading font-extrabold text-white">Reset Password</h1>
        <p class="mt-2 text-sm text-slate-400 font-light">Set a new dashboard password to continue.</p>
      </div>

      <form id="resetPasswordForm" class="space-y-5" novalidate>
        <div>
          <label for="newPassword" class="premium-label">New Password</label>
          <input id="newPassword" name="password" type="password" minlength="8" required class="premium-input" placeholder="Enter at least 8 characters" />
        </div>
        <div>
          <label for="confirmPassword" class="premium-label">Confirm Password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required class="premium-input" placeholder="Re-enter your new password" />
        </div>
        <div class="pt-2">
          <button id="resetPasswordBtn" type="submit" class="w-full inline-flex justify-center items-center rounded-xl bg-gradient-to-r from-brand-600 to-purple-600 px-6 py-3.5 text-sm font-bold text-white shadow-[0_0_20px_rgba(102,126,178,0.4)] transition-all duration-300 hover:shadow-[0_0_30px_rgba(102,126,178,0.6)] hover:-translate-y-0.5 border-none">
            Reset Password
          </button>
        </div>
      </form>
      
      <p id="resetPasswordMsg" class="mt-5 text-sm text-center font-medium"></p>
      
      <div class="mt-6 border-t border-white/5 pt-6 text-center">
        <a href="/dashboard/login/" class="inline-flex items-center text-sm font-semibold text-brand-400 hover:text-brand-300 transition-colors group/link">
