<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Player | User Dashboard</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Manrope', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eef2fb',
                100: '#dfe7f7',
                200: '#ccd3e6',
                300: '#99a9cc',
                400: '#667eb2',
                500: '#22345f',
                600: '#1a2849',
                700: '#14213d',
                800: '#0f182d',
                900: '#0a101e',
              },
            },
          },
        },
      };
    </script>
    <style>
      [hidden] { display: none !important; }
      .player-lesson.active {
        background: #eef2fb;
        border-color: #b8c7eb;
      }
    </style>
  </head>
  <body class="user-dashboard-page bg-gray-50 text-gray-900 font-sans antialiased h-screen overflow-hidden selection:bg-brand-100">
    <section class="flex h-full w-full">
      <input type="checkbox" id="mobile-menu-toggle" class="peer hidden" />
      <label for="mobile-menu-toggle" class="fixed inset-0 bg-brand-900/40 z-40 hidden peer-checked:block md:hidden cursor-pointer backdrop-blur-sm transition-opacity"></label>
      <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-brand-800 text-white flex flex-col transform -translate-x-full peer-checked:translate-x-0 md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="h-16 flex items-center px-6 border-b border-white/10">
          <span class="flex items-center justify-center h-8 w-8 rounded bg-brand-600 text-white font-heading font-bold text-sm mr-3">TN</span>
          <span class="font-heading font-bold text-lg">User Workspace</span>
        </div>
        <nav class="flex-1 overflow-y-auto p-4 space-y-1">
          <a href="/dashboard/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-brand-100 hover:bg-white/5">Overview</a>
          <a href="/dashboard/courses/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-brand-600/40 text-white">My Courses</a>
          <a href="/dashboard/domains/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-brand-100 hover:bg-white/5">My Domains</a>
          <a href="/dashboard/domains/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-brand-100 hover:bg-white/5">Register Domain</a>
        </nav>
        <div class="p-4 border-t border-white/10">
          <button type="button" class="w-full inline-flex items-center justify-center rounded-lg bg-white/10 px-4 py-2.5 text-sm font-semibold text-white hover:bg-white/20 transition-colors" data-user-signout>Sign out</button>
        </div>
      </aside>

      <div class="flex-1 min-w-0 flex flex-col">
        <header class="user-dashboard-topbar h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6">
          <div class="flex items-center gap-4">
            <label for="mobile-menu-toggle" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-brand-700 cursor-pointer rounded-lg hover:bg-gray-100">
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </label>
            <div>
              <h1 id="playerCourseTitle" class="text-lg font-heading font-bold text-gray-900">Course Player</h1>
              <p id="playerCourseMeta" class="text-xs text-gray-500">Loading lessons...</p>
            </div>
          </div>
          <button type="button" class="inline-flex items-center justify-center rounded-lg bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50" data-user-signout>Sign out</button>
        </header>

        <main class="user-dashboard-main flex-1 overflow-y-auto p-4 sm:p-6">
          <div class="grid grid-cols-1 xl:grid-cols-[20rem_minmax(0,1fr)] gap-4 sm:gap-6 max-w-7xl mx-auto">
            <section class="bg-white rounded-2xl ring-1 ring-gray-200 p-4 sm:p-5 h-fit">
              <div class="flex items-center justify-between gap-3">
                <p class="text-xs font-bold uppercase tracking-wider text-brand-600">Modules & Lessons</p>
                <span id="playerCompletionBadge" class="inline-flex items-center rounded-full bg-brand-50 text-brand-700 px-3 py-1 text-xs font-bold">0%</span>
              </div>
              <div class="mt-3 h-2 rounded-full bg-gray-100 overflow-hidden">
                <span id="playerProgressBar" class="block h-full bg-brand-600 transition-all" style="width:0%"></span>
              </div>
              <p id="playerProgressText" class="mt-2 text-xs text-gray-600">0 of 0 lessons completed</p>
              <div id="playerSidebar" class="mt-4 space-y-4"></div>
            </section>

            <section class="bg-white rounded-2xl ring-1 ring-gray-200 p-4 sm:p-6">
              <p id="playerStatus" class="text-sm font-medium text-gray-600 mb-3">Preparing player...</p>

              <div id="playerPane" hidden>
                <div class="rounded-xl bg-gray-900 overflow-hidden ring-1 ring-gray-200">
                  <div class="relative w-full bg-black" style="aspect-ratio:16/9; min-height:220px;">
                    <div id="playerSkeleton" class="absolute inset-0 z-10 pointer-events-none">
                      <div class="absolute inset-0 animate-pulse bg-gradient-to-br from-gray-800 via-gray-700 to-gray-800"></div>
                      <div class="absolute inset-0 flex items-center justify-center">
                        <span class="inline-flex items-center rounded-full bg-white/10 px-3 py-1 text-xs font-semibold text-gray-100">Loading video...</span>
                      </div>
                    </div>
                    <div id="lessonVideoFrameHost" class="absolute inset-0 bg-black"></div>
                  </div>
                </div>
                <div class="mt-4 flex flex-wrap items-center justify-between gap-3">
                  <div>
                    <h2 id="lessonTitle" class="text-xl font-heading font-bold text-gray-900"></h2>
                    <p id="lessonMeta" class="text-sm text-gray-500"></p>
                  </div>
                  <div class="flex flex-wrap items-center gap-2">
                    <button id="prevLessonBtn" type="button" class="inline-flex items-center justify-center rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Previous lesson</button>
                    <button id="nextLessonBtn" type="button" class="inline-flex items-center justify-center rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">Next lesson</button>
                    <button id="playerRetryBtn" type="button" class="inline-flex items-center justify-center rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm font-bold text-gray-700 hover:bg-gray-50">Retry player</button>
                    <button id="markCompleteBtn" type="button" class="inline-flex items-center justify-center rounded-xl bg-brand-600 px-5 py-3 text-sm font-bold text-white hover:bg-brand-500 transition-colors">Mark lesson complete</button>
                  </div>
                </div>
              </div>

              <div id="playerEmpty" hidden class="rounded-xl border border-gray-200 bg-gray-50 p-5 text-sm text-gray-600">
                No lessons are mapped for this course yet.
              </div>
            </section>
          </div>
        </main>
      </div>
    </section>

    <script src="/assets/user-dashboard-shell.js" defer></script>
    <script src="/assets/dashboard-course-player.js?v=20260404v" defer></script>
  </body>
</html>
