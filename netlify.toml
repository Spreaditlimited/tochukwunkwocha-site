[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/services/lead-capture"
  to = "/services/lead-capture/"
  status = 301

[[redirects]]
  from = "/internal"
  to = "/internal/"
  status = 301

[[redirects]]
  from = "/projects/*"
  to = "/projects/index.html"
  status = 200

[[redirects]]
  from = "/schools/register"
  to = "/schools/login/"
  status = 301

[[redirects]]
  from = "/schools/register/*"
  to = "/schools/login/"
  status = 301

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[functions."learning-drip-cron"]
  schedule = "*/10 * * * *"

[functions."domain-renewal-notify-cron"]
  schedule = "15 8 * * *"

[functions."paystack-reconcile-cron"]
  schedule = "*/10 * * * *"

[functions."domain-registration-cron"]
  schedule = "*/10 * * * *"

[functions."affiliate-commissions-mature-cron"]
  schedule = "0 * * * *"
