[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/services/lead-capture"
  to = "/services/lead-capture/"
  status = 301

[[redirects]]
  from = "/internal"
  to = "/internal/"
  status = 301

[[redirects]]
  from = "/projects/*"
  to = "/projects/index.html"
  status = 200

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
