[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/services/lead-capture"
  to = "/services/lead-capture/"
  status = 301

[[redirects]]
  from = "/internal"
  to = "/internal/"
  status = 301

[[redirects]]
  from = "/projects/*"
  to = "/projects/index.html"
  status = 200

[[redirects]]
  from = "/schools/register"
  to = "/schools/login/"
  status = 301

[[redirects]]
  from = "/schools/register/*"
  to = "/schools/login/"
  status = 301

[[redirects]]
  from = "/courses/prompt-to-profit-kids/"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-kids"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-children/"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-children"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-for-job-seekers/"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-for-job-seekers"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-holiday/"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[redirects]]
  from = "/courses/prompt-to-profit-holiday"
  to = "/courses/prompt-to-profit"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/assets/bundles/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/optimized/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/dashboard"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[headers]]
  for = "/internal/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[functions."learning-drip-cron"]
  schedule = "*/10 * * * *"

[functions."domain-renewal-notify-cron"]
  schedule = "15 8 * * *"

[functions."paystack-reconcile-cron"]
  schedule = "*/10 * * * *"

[functions."domain-registration-cron"]
  schedule = "*/10 * * * *"

[functions."affiliate-commissions-mature-cron"]
  schedule = "0 * * * *"

[functions."school-call-reminder-cron"]
  schedule = "*/10 * * * *"

[functions."whatsapp-send-cron"]
  schedule = "*/10 * * * *"
