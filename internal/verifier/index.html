<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Plan Verifier | Internal</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen p-4 sm:p-6">
    <section id="verifierLoginCard" class="max-w-md mx-auto mt-12 rounded-2xl border border-gray-200 bg-white p-6 shadow-sm">
      <h1 class="text-2xl font-heading font-extrabold text-gray-900">Verifier Login</h1>
      <p class="mt-2 text-sm text-gray-600">Sign in to review business plans awaiting verification.</p>
      <form id="verifierLoginForm" class="mt-6 space-y-4">
        <div>
          <label for="verifierEmail" class="block text-sm font-semibold text-gray-800">Email</label>
          <input id="verifierEmail" name="email" type="email" class="mt-2 block w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900" required />
        </div>
        <div>
          <label for="verifierPassword" class="block text-sm font-semibold text-gray-800">Password</label>
          <input id="verifierPassword" name="password" type="password" class="mt-2 block w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900" required />
        </div>
        <button id="verifierLoginBtn" type="submit" class="inline-flex w-full items-center justify-center rounded-xl bg-[#14213d] px-5 py-3 text-sm font-bold text-white hover:bg-[#22345f]">Sign In</button>
      </form>
      <p id="verifierLoginMsg" class="mt-3 text-sm"></p>
    </section>

    <section id="verifierApp" class="max-w-6xl mx-auto space-y-4" hidden>
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-heading font-extrabold text-gray-900">Awaiting Verification</h2>
        <button id="verifierSignOutBtn" type="button" class="rounded-xl border border-gray-300 bg-white px-4 py-2 text-sm font-semibold text-gray-700 hover:bg-gray-50">Sign out</button>
      </div>
      <p id="verifierMeta" class="text-sm text-gray-600">Loading plans...</p>
      <div id="verifierRows" class="space-y-3"></div>
    </section>

    <div id="verifierModal" class="fixed inset-0 z-[70] hidden" aria-hidden="true">
      <div class="absolute inset-0 bg-black/50" data-v-close></div>
      <div class="absolute inset-0 flex items-center justify-center p-4">
        <div class="w-full max-w-3xl rounded-2xl bg-white border border-gray-200 shadow-xl overflow-hidden">
          <div class="flex items-center justify-between border-b border-gray-100 px-6 py-4">
            <h3 class="text-lg font-heading font-extrabold text-gray-900">Plan Details</h3>
            <button type="button" class="rounded-lg px-3 py-2 text-sm text-gray-600 hover:bg-gray-100" data-v-close>Close</button>
          </div>
          <div class="max-h-[70vh] overflow-y-auto p-6 space-y-4">
            <pre id="verifierPlanText" class="whitespace-pre-wrap text-sm text-gray-700"></pre>
            <textarea id="verifierNotes" rows="3" class="block w-full rounded-xl border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900" placeholder="Verification notes (optional)"></textarea>
            <button id="verifierMarkBtn" type="button" class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-5 py-3 text-sm font-bold text-white hover:bg-emerald-500">Mark Verified</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/admin-business-plan-verifier.js" defer></script>
  </body>
</html>
