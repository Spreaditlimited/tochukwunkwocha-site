<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Installments | Internal</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              heading: ["Manrope", "sans-serif"],
            },
            colors: {
              brand: {
                50: "#eef2fb",
                100: "#dfe7f7",
                200: "#ccd3e6",
                300: "#99a9cc",
                400: "#667eb2",
                500: "#22345f",
                600: "#1a2849",
                700: "#14213d",
                800: "#0f182d",
                900: "#0a101e",
              },
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        /* Filter Button Logic */
        .status-filter__btn.is-active {
          @apply bg-white text-gray-900 shadow-sm ring-1 ring-gray-200;
        }
        .status-filter__btn:not(.is-active) {
          @apply text-gray-500 hover:text-gray-700 hover:bg-gray-50;
        }
        
        /* Strict hidden enforcement for JS toggling */
        [hidden] {
          display: none !important;
        }

        /* Standardize injected table cells */
        #adminRows td {
          @apply whitespace-nowrap px-4 py-4 text-sm text-gray-600 border-b border-gray-100;
        }

        /* Custom Select Wrap */
        .picker-wrap {
          @apply relative;
        }
        .picker-select {
          @apply block w-full appearance-none rounded-xl border-0 bg-white py-2.5 pl-3 pr-10 text-sm font-medium text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 transition-all;
          @apply hover:ring-brand-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-brand-600;
        }
        .picker-wrap__icon {
          @apply pointer-events-none absolute inset-y-0 right-3 flex items-center text-brand-600;
        }

        /* Horizontal scroll without visible scrollbar */
        .hide-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
          width: 0;
          height: 0;
          display: none;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased h-screen w-full overflow-hidden selection:bg-brand-100 selection:text-brand-900">
    
    <main id="internalShell" class="flex h-full w-full flex-col">

      <section id="adminAppCard" class="flex h-full w-full">
        
        <input type="checkbox" id="mobile-menu-toggle" class="peer hidden" />
        <label for="mobile-menu-toggle" class="fixed inset-0 bg-gray-900/80 z-40 hidden peer-checked:block md:hidden cursor-pointer backdrop-blur-sm transition-opacity"></label>

        <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-brand-800 text-white flex flex-col transform -translate-x-full peer-checked:translate-x-0 md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
          <div class="h-16 flex items-center px-6 bg-brand-900/50 border-b border-white/5 shrink-0">
            <span class="flex items-center justify-center h-8 w-8 rounded bg-brand-600 text-white font-heading font-bold text-sm mr-3">TN</span>
            <span class="font-heading font-bold text-lg tracking-tight">Admin Portal</span>
          </div>
          
          <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
            <p class="px-2 text-xs font-bold uppercase tracking-wider text-brand-300 mb-2">Menu</p>
            
            <a href="/internal/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
              <svg class="h-5 w-5 text-brand-300 group-hover:text-brand-100 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
              Dashboard Home
            </a>
            
            <a href="/internal/manual-payments/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
              <svg class="h-5 w-5 text-brand-300 group-hover:text-brand-100 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
              Enrollments
            </a>
            
            <a href="/internal/installments/" class="flex items-center gap-3 px-3 py-2.5 bg-brand-600/40 text-white rounded-lg font-medium transition-colors">
              <svg class="h-5 w-5 text-brand-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              Installments
            </a>
            
            <a href="/internal/leadpage-jobs/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
              <svg class="h-5 w-5 text-brand-300 group-hover:text-brand-100 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14v6m-3-3h6M6 10h2a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v2a2 2 0 002 2zm10 0h2a2 2 0 002-2V6a2 2 0 00-2-2h-2a2 2 0 00-2 2v2a2 2 0 002 2zM6 20h2a2 2 0 002-2v-2a2 2 0 00-2-2H6a2 2 0 00-2 2v2a2 2 0 002 2z" /></svg>
              Lead Capture Jobs
            </a>
            <a href="/internal/business-plan-manager/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
              <svg class="h-5 w-5 text-brand-300 group-hover:text-brand-100 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2m5-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
              Business Plan Manager
            </a>
            <a href="/internal/settings/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors group">
              <svg class="h-5 w-5 text-brand-300 group-hover:text-brand-100 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.591 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.59c1.756.427 1.756 2.925 0 3.352a1.724 1.724 0 00-1.066 2.59c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.59 1.066c-.427 1.756-2.925 1.756-3.352 0a1.724 1.724 0 00-2.59-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.59c-1.756-.427-1.756-2.925 0-3.352a1.724 1.724 0 001.066-2.59c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.59-1.066z" /></svg>
              Settings
            </a>
          </div>
          
          <div class="p-4 border-t border-white/10 shrink-0">
            <a href="/" class="flex items-center gap-2 px-3 py-2 text-sm text-brand-300 hover:text-white transition-colors">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
              Back to public site
            </a>
          </div>
        </aside>

        <div class="flex-1 flex flex-col h-full min-w-0 bg-gray-50 overflow-hidden relative">
          
          <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 shadow-sm">
            <div class="flex items-center gap-4">
              <label for="mobile-menu-toggle" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-gray-900 cursor-pointer rounded-md hover:bg-gray-100">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
              </label>
              <h2 class="text-xl font-heading font-bold text-gray-900 truncate">Installments</h2>
            </div>
            <div class="flex items-center gap-4">
              <button 
                id="adminLogoutBtn" 
                type="button" 
                class="hidden sm:inline-flex items-center justify-center rounded-lg bg-white px-3 py-1.5 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-colors"
              >
                Sign out
              </button>
            </div>
          </header>

          <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
            <div class="max-w-[90rem] mx-auto">
              
              <section class="rounded-2xl border border-gray-200 bg-white shadow-sm p-5 sm:p-6">
                <p class="text-xs font-bold uppercase tracking-wider text-brand-600">Summary</p>
                <div class="mt-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
                  <article class="rounded-xl border border-gray-200 bg-gray-50 px-5 py-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Plans</p>
                    <p class="mt-1 text-lg font-bold text-gray-900" id="summaryPlans">--</p>
                  </article>
                  <article class="rounded-xl border border-gray-200 bg-gray-50 px-5 py-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Paid Installments</p>
                    <p class="mt-1 text-lg font-bold text-gray-900" id="summaryPaid">--</p>
                  </article>
                  <article class="rounded-xl border border-gray-200 bg-gray-50 px-5 py-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">In Progress</p>
                    <p class="mt-1 text-lg font-bold text-gray-900 text-amber-700" id="summaryPending">--</p>
                  </article>
                  <article class="rounded-xl border border-gray-200 bg-gray-50 px-5 py-4">
                    <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Total Paid Amount</p>
                    <p class="mt-1 text-lg font-bold text-gray-900 text-green-700" id="summaryAmount">--</p>
                  </article>
                </div>
              </section>

              <div class="mt-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                
                <div class="w-full xl:w-auto">
                  <div class="flex flex-col sm:flex-row sm:items-center gap-3">
                    <div class="picker-wrap w-full sm:w-auto">
                      <select id="adminCourseFilter" class="picker-select min-w-[14rem]" aria-label="Filter by course">
                        <option value="prompt-to-profit">Prompt to Profit</option>
                        <option value="prompt-to-production">Prompt to Production</option>
                      </select>
                      <span class="picker-wrap__icon" aria-hidden="true">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 20 20" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8l4 4 4-4" /></svg>
                      </span>
                    </div>
                    
                    <div class="picker-wrap w-full sm:w-auto">
                      <select id="adminBatchFilter" class="picker-select min-w-[13rem]" aria-label="Filter by batch">
                        <option value="all">All batches</option>
                      </select>
                      <span class="picker-wrap__icon" aria-hidden="true">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 20 20" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 8l4 4 4-4" /></svg>
                      </span>
                    </div>
                    
                    <div id="adminStatusFilter" role="tablist" aria-label="Filter by status" class="inline-flex flex-wrap items-center gap-1 p-1 rounded-lg bg-gray-100/80 ring-1 ring-gray-200 w-full sm:w-auto">
                      <button type="button" class="status-filter__btn is-active flex-1 sm:flex-none px-4 py-1.5 text-sm font-medium rounded-md transition-all" data-status="all">All</button>
                      <button type="button" class="status-filter__btn flex-1 sm:flex-none px-4 py-1.5 text-sm font-medium rounded-md transition-all" data-status="paid">Paid</button>
                    </div>
                  </div>
                </div>

                <div class="flex items-center gap-3 w-full xl:w-auto">
                  <div class="relative rounded-md shadow-sm flex-1 sm:w-80">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <svg class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <input 
                      id="adminSearchInput" 
                      type="text" 
                      placeholder="Search student, email, reference..." 
                      class="block w-full rounded-xl border-0 py-2.5 pl-10 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-brand-600 sm:text-sm sm:leading-6 transition-all"
                    />
                  </div>
                  <button 
                    id="adminRefreshBtn" 
                    type="button" 
                    class="inline-flex items-center justify-center rounded-xl bg-white p-2.5 text-gray-500 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 hover:text-gray-900 transition-colors shrink-0" 
                    title="Refresh Data"
                  >
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                  </button>
                </div>
              </div>

              <p id="adminMessage" class="mt-4 text-sm text-gray-500 hidden"></p>

              <div class="mt-6 flex flex-col">
                <div class="-mx-4 -my-2 overflow-x-auto hide-scrollbar overscroll-x-contain sm:-mx-6 lg:-mx-8">
                  <div class="inline-block min-w-full py-2 align-middle sm:px-6 lg:px-8">
                    <div class="overflow-hidden shadow-sm ring-1 ring-gray-200 sm:rounded-xl bg-white">
                      <table class="min-w-[72rem] divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                          <tr>
                            <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Date</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Student</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Batch</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Provider</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Payment</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Plan Progress</th>
                            <th scope="col" class="px-3 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Reference</th>
                          </tr>
                        </thead>
                        <tbody id="adminRows" class="divide-y divide-gray-200 bg-white">
                          </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </main>
        </div>
      </section>
      
    </main>

    <script src="/assets/admin-installments.js" defer></script>
  </body>
</html>
