<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Progress | Internal</title>
    <link rel="icon" href="/assets/tochukwu-tech-logo-icon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Manrope', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eef2fb',
                100: '#dfe7f7',
                200: '#ccd3e6',
                300: '#99a9cc',
                400: '#667eb2',
                500: '#22345f',
                600: '#1a2849',
                700: '#14213d',
                800: '#0f182d',
                900: '#0a101e',
              }
            }
          }
        }
      }
    </script>
    <style type="text/tailwindcss">
      @layer utilities {
        [hidden] { display: none !important; }
        .picker-wrap {
          @apply relative;
        }
        .picker-select {
          @apply block w-full appearance-none rounded-xl border-0 bg-white py-2.5 pl-3 pr-10 text-sm font-medium text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 transition-all;
          @apply hover:ring-brand-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-brand-600;
        }
        .picker-wrap__icon {
          @apply pointer-events-none absolute inset-y-0 right-3 flex items-center text-brand-600;
        }
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased h-screen w-full overflow-hidden selection:bg-brand-100 selection:text-brand-900">
    <section id="adminAppCard" class="flex h-full w-full">
      <input type="checkbox" id="mobile-menu-toggle" class="peer hidden" />
      <label for="mobile-menu-toggle" class="fixed inset-0 bg-gray-900/80 z-40 hidden peer-checked:block md:hidden cursor-pointer backdrop-blur-sm transition-opacity"></label>

      <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-brand-800 text-white flex flex-col transform -translate-x-full peer-checked:translate-x-0 md:relative md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
        <div class="h-16 flex items-center px-6 bg-brand-900/50 border-b border-white/5 shrink-0">
          <img src="/assets/tochukwu-tech-logo-icon.png" alt="Tochukwu Tech" class="h-8 w-8 rounded object-contain bg-white p-0.5 mr-3" />
          <span class="font-heading font-bold text-lg tracking-tight">Admin Portal</span>
        </div>
        <div class="flex-1 overflow-y-auto py-6 px-4 space-y-1">
          <p class="px-2 text-xs font-bold uppercase tracking-wider text-brand-300 mb-2">Menu</p>
          <a href="/internal/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Dashboard Home</a>
          <a href="/internal/manual-payments/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Enrollments</a>
          <a href="/internal/installments/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Installments</a>
          <a href="/internal/domain-management/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Domain Management</a>
          <a href="/internal/video-library/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Video Library</a>
          <a href="/internal/learning-progress/" class="flex items-center gap-3 px-3 py-2.5 bg-brand-600/40 text-white rounded-lg font-medium transition-colors">Learning Progress</a>
          <a href="/internal/settings/" class="flex items-center gap-3 px-3 py-2.5 text-brand-100 hover:bg-white/5 hover:text-white rounded-lg font-medium transition-colors">Settings</a>
        </div>
        <div class="p-4 border-t border-white/10 shrink-0">
          <button type="button" data-admin-signout class="w-full inline-flex items-center justify-center rounded-lg bg-white/10 px-4 py-2.5 text-sm font-semibold text-white hover:bg-white/20 transition-colors">Sign out</button>
        </div>
      </aside>

      <div class="flex-1 flex flex-col h-full min-w-0 bg-gray-50 overflow-hidden relative">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 sm:px-6 lg:px-8 shrink-0 z-10 shadow-sm">
          <div class="flex items-center gap-4">
            <label for="mobile-menu-toggle" class="md:hidden p-2 -ml-2 text-gray-500 hover:text-gray-900 cursor-pointer rounded-md hover:bg-gray-100">
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            </label>
            <h2 class="text-xl font-heading font-bold text-gray-900 truncate">Learning Progress</h2>
          </div>
          <button id="adminLogoutBtn" type="button" class="inline-flex items-center justify-center rounded-lg bg-white px-3 py-1.5 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-colors">Sign out</button>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
          <div class="max-w-7xl mx-auto space-y-6">
            <section class="rounded-2xl border border-gray-200 bg-white shadow-sm p-5 sm:p-6">
              <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Course</label>
                  <div class="picker-wrap">
                    <select id="progressCourseFilter" class="picker-select">
                      <option value="prompt-to-profit">Prompt to Profit</option>
                      <option value="prompt-to-production">Prompt to Profit Advanced</option>
                    </select>
                    <span class="picker-wrap__icon" aria-hidden="true">
                      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.25 7.75a.75.75 0 0 1 1.06 0L10 11.44l3.69-3.69a.75.75 0 1 1 1.06 1.06l-4.22 4.22a.75.75 0 0 1-1.06 0L5.25 8.81a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                    </span>
                  </div>
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Enrollment</label>
                  <div class="picker-wrap">
                    <select id="progressEnrollmentTypeFilter" class="picker-select">
                      <option value="all">All Enrollments</option>
                      <option value="individual">Individual</option>
                      <option value="school">School Registration</option>
                    </select>
                    <span class="picker-wrap__icon" aria-hidden="true">
                      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.25 7.75a.75.75 0 0 1 1.06 0L10 11.44l3.69-3.69a.75.75 0 1 1 1.06 1.06l-4.22 4.22a.75.75 0 0 1-1.06 0L5.25 8.81a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                    </span>
                  </div>
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Batch</label>
                  <div class="picker-wrap">
                    <select id="progressBatchFilter" class="picker-select">
                      <option value="all">All Batches</option>
                    </select>
                    <span class="picker-wrap__icon" aria-hidden="true">
                      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.25 7.75a.75.75 0 0 1 1.06 0L10 11.44l3.69-3.69a.75.75 0 1 1 1.06 1.06l-4.22 4.22a.75.75 0 0 1-1.06 0L5.25 8.81a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                    </span>
                  </div>
                </div>
                <div>
                  <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Student search</label>
                  <input id="progressSearchInput" type="text" placeholder="Name or email" class="w-full rounded-xl border border-gray-300 px-3 py-2.5 text-sm" />
                </div>
                <div class="flex items-end md:col-span-4">
                  <button id="progressRefreshBtn" type="button" class="w-full sm:w-auto inline-flex items-center justify-center rounded-xl bg-brand-600 px-4 py-2.5 text-sm font-bold text-white hover:bg-brand-500">Refresh</button>
                </div>
              </div>
              <p id="progressMessage" class="mt-3 text-sm text-gray-600">Loading progress records...</p>
            </section>

            <section class="rounded-2xl border border-gray-200 bg-white shadow-sm overflow-hidden">
              <div class="overflow-x-auto">
                <table class="min-w-full text-sm">
                  <thead class="bg-gray-50 text-gray-500 uppercase text-xs tracking-wide">
                    <tr>
                      <th class="text-left px-4 py-3">Student</th>
                      <th class="text-left px-4 py-3">Completed</th>
                      <th class="text-left px-4 py-3">Progress</th>
                      <th class="text-left px-4 py-3">Last Lesson</th>
                      <th class="text-left px-4 py-3">Last Activity</th>
                      <th class="text-left px-4 py-3">Module Breakdown</th>
                      <th class="text-right px-4 py-3">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="progressRows" class="divide-y divide-gray-100"></tbody>
                </table>
              </div>
            </section>

            <section id="progressDetailCard" class="hidden fixed inset-0 z-[70]">
              <button id="detailBackdrop" type="button" aria-label="Close detail modal" class="absolute inset-0 bg-gray-900/60 backdrop-blur-[1px]"></button>
              <div class="relative z-10 h-full w-full p-3 sm:p-6 lg:p-8 flex items-end sm:items-center justify-center">
                <div class="w-full max-w-4xl max-h-[92vh] overflow-hidden rounded-2xl border border-gray-200 bg-white shadow-2xl flex flex-col">
                  <div class="p-5 sm:p-6 border-b border-gray-200">
                    <div class="flex items-start justify-between gap-4">
                      <div>
                        <p class="text-xs font-bold uppercase tracking-wider text-brand-600">Student Detail</p>
                        <h3 id="detailName" class="text-lg font-heading font-bold text-gray-900"></h3>
                        <p id="detailEmail" class="text-sm text-gray-500"></p>
                      </div>
                      <button id="detailCloseBtn" type="button" class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-3 py-1.5 text-xs font-semibold text-gray-700 hover:bg-gray-50">Close</button>
                    </div>
                    <div class="mt-3 h-2 rounded-full bg-gray-100 overflow-hidden">
                      <span id="detailProgressBar" class="block h-full bg-brand-600" style="width:0%"></span>
                    </div>
                    <p id="detailProgressText" class="mt-2 text-sm text-gray-600"></p>
                  </div>
                  <div id="detailModules" class="p-5 sm:p-6 overflow-y-auto space-y-4"></div>
                </div>
              </div>
            </section>
          </div>
        </main>
      </div>
    </section>

    <script src="/assets/internal-auth.js" defer></script>
    <script src="/assets/internal-nav.js?v=20260404d" defer></script>
    <script src="/assets/admin-learning-progress.js?v=20260409a" defer></script>
  </body>
</html>
